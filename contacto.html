<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Contacto - Curso de HTML5 y CSS3</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contacto.css">
</head>
<body>
<div id="page">
    <header>
        <h1><img src="imgs/logo.png" alt="Logo"> Curso de HTML5 y CSS3</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Contenidos</a></li>
            <li><a href="videos.html">Vídeos</a></li>
            <li><a>Contacto</a></li>
        </ul>
    </nav>

    <main id="main-contacto">
        <div id="contenedorFormulario">
            <h1 id="tituloForm">Contáctenos</h1>
            <form id="formularioContacto">
                <div class="input-container">
                    <input type="text" id="nombre" name="nombre" placeholder="Escriba su nombre" required list="listaNombres">
                    <label class="req"></label>
                    <datalist id="listaNombres">
                        <option value="alex"><option value="juan"><option value="ana"><option value="pedro">
                    </datalist>
                </div>

                <div class="input-container">
                    <input type="email" id="correo" name="correo" placeholder="Escriba su email" required>
                    <label class="req"></label>
                </div>

                <div class="input-container">
                    <textarea id="mensaje" name="mensaje" placeholder="Su mensaje…" required></textarea>
                </div>

                <button type="submit" id="btnEnviar">Enviar</button>
            </form>
        </div>
    </main>

    <footer>
		<p>
			<small>Alejandro Amat Reina © 2014. Curso de HTML5 y CSS3.</small>
		</p>
		<address>
			Impartido para:
			<a href="http://cefire.edu.gva.es">CEFIRE - Específico de Formación Profesional</a>
		</address>
	</footer>
</div>
<script src="scripts/contacto.js"></script>
</body>
</html>
