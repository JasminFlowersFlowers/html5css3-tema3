<!doctype html>
<html lang="es">

<head>
	<meta charset="utf-8">
	<title>Vídeos</title>

	<link rel="stylesheet" href="css/styles.css">
	<link rel="stylesheet" href="css/reproductor.css">
</head>

<body>

	<div id="page">

		<header>
			<h1>
				<img src="imgs/logo.png" alt="Logo">
				Curso de HTML5 y CSS3
			</h1>
		</header>

		<nav>
			<ul>
				<li><a href="index.html">Contenidos</a></li>
				<li><a href="videos.html">Vídeos</a></li>
				<li><a href="contacto.html">Contacto</a></li>
			</ul>
		</nav>

		<main>

			<!-- REPRODUCTOR -->
			<div id="reproductor">
				<video id="medio" width="710" height="400">
					<source src="media/trailer.mp4">
					<source src="media/trailer.ogg">
				</video>

				<div id="barra">
					<div id="progreso"></div>
				</div>
			</div>

			<!-- CONTROLES -->
			<nav>
				<input type="button" id="reiniciar" value="reiniciar">
				<input type="button" id="retrasar" value="<<">
				<input type="button" id="play" value="▶">
				<input type="button" id="adelantar" value=">>">

				<input type="button" id="silenciar" value="silenciar">

				<label>Volumen</label>

				<input type="button" id="menosVolumen" value="-">
				<input type="button" id="masVolumen" value="+">
			</nav>

		</main>

		<footer>
			<p>
				<small>Alejandro Amat Reina © 2014. Curso de HTML5 y CSS3.</small>
			</p>
			<address>

</html>
